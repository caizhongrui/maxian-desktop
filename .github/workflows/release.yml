name: Release (all platforms)

on:
  push:
    tags: ['v*']
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    name: ${{ matrix.platform.name }}
    runs-on: ${{ matrix.platform.os }}
    strategy:
      fail-fast: false
      matrix:
        platform:
          - os: macos-latest
            name: "macOS (Apple Silicon)"
            sidecar: "darwin-arm64"
            rustTarget: "aarch64-apple-darwin"
            isMac: true
          - os: macos-13
            name: "macOS (Intel)"
            sidecar: "darwin-x64"
            rustTarget: "x86_64-apple-darwin"
            isMac: true
          - os: windows-latest
            name: "Windows x64"
            sidecar: "win32-x64"
            rustTarget: "x86_64-pc-windows-msvc"
            isMac: false
          - os: ubuntu-22.04
            name: "Linux x64"
            sidecar: "linux-x64"
            rustTarget: "x86_64-unknown-linux-gnu"
            isMac: false

    steps:
      - uses: actions/checkout@v4

      # ── 安装 Bun（sidecar 单文件编译器）────────────────────────
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      # ── Node.js + pnpm（pnpm 版本自动从 package.json 读取） ───
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      # ── Rust toolchain ────────────────────────────────────────
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform.rustTarget }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: maxian-desktop/src-tauri -> target
          key: ${{ matrix.platform.rustTarget }}

      # ── Linux 系统依赖 ─────────────────────────────────────────
      - name: Install Linux system deps
        if: matrix.platform.os == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libappindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev

      # ── 安装 npm deps ─────────────────────────────────────────
      - name: Install deps
        run: pnpm install --frozen-lockfile

      # ── 先 build workspace 依赖（core/sdk），否则 server 找不到 ─
      # 它们的 main/types 指向 dist/，必须先跑 tsc
      - name: Build @maxian/core
        run: pnpm --filter @maxian/core run build

      - name: Build @maxian/sdk
        run: pnpm --filter @maxian/sdk run build

      # ── 编译 maxian-server 单文件 sidecar ─────────────────────
      - name: Build sidecar binary
        working-directory: maxian-server
        run: pnpm run build:bin:${{ matrix.platform.sidecar }}

      # ── 拷贝 sidecar 到 src-tauri/bin/ ────────────────────────
      - name: Sync sidecar
        working-directory: maxian-desktop
        run: node scripts/sync-sidecar.mjs ${{ matrix.platform.sidecar }}

      # ── Tauri Build（含 beforeBuildCommand: vite build） ───────
      # 注：updater 签名暂未启用（createUpdaterArtifacts=false），
      # 需要自动更新时再配 TAURI_SIGNING_PRIVATE_KEY / PASSWORD 两个 secrets
      - name: Tauri Build
        working-directory: maxian-desktop
        run: pnpm tauri build --target ${{ matrix.platform.rustTarget }}

      # ── macOS: 手工 hdiutil 生成 DMG（绕开 create-dmg 中文 bug） ─
      - name: Create DMG (macOS only)
        if: matrix.platform.isMac == true
        working-directory: maxian-desktop
        env:
          TAURI_BUILD_TARGET: ${{ matrix.platform.rustTarget }}
        run: node scripts/make-dmg.mjs

      # ── 列出本平台产物（用于 debug + gh-release 文件匹配） ─────
      - name: List artifacts
        shell: bash
        run: |
          echo "--- bundle tree (${{ matrix.platform.rustTarget }}) ---"
          find "maxian-desktop/src-tauri/target/${{ matrix.platform.rustTarget }}/release/bundle" -maxdepth 3 -type f \( -name "*.dmg" -o -name "*.msi" -o -name "*.exe" -o -name "*.deb" -o -name "*.rpm" -o -name "*.AppImage" -o -name "*.tar.gz" -o -name "*.sig" \) 2>/dev/null || true

      # ── 上传到 GitHub Release（draft） ──────────────────────────
      - name: Upload to Release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          name: "Maxian ${{ github.ref_name }}"
          tag_name: ${{ github.ref_name }}
          body: |
            ## 📦 下载

            | 平台 | 文件 |
            |------|------|
            | macOS (Apple Silicon) | `.dmg` `aarch64` |
            | macOS (Intel) | `.dmg` `x64` |
            | Windows x64 | `.exe` (NSIS installer) |
            | Linux x64 | `.AppImage` / `.deb` / `.rpm` |

            ### 安装说明
            - **macOS**：双击 `.dmg`，把 `码弦Desktop.app` 拖进 Applications。首次启动若提示"未验证的开发者"，右键图标选"打开"。
            - **Windows**：双击 `.exe` (NSIS setup) 按提示安装。
            - **Linux**：`.AppImage` 加可执行权限即可运行；`.deb` 用 `dpkg -i` 安装。

            全部安装包**无需单独安装 Node.js**（maxian-server 已内嵌为 sidecar）。
          files: |
            maxian-desktop/src-tauri/target/${{ matrix.platform.rustTarget }}/release/bundle/dmg/*.dmg
            maxian-desktop/src-tauri/target/${{ matrix.platform.rustTarget }}/release/bundle/nsis/*.exe
            maxian-desktop/src-tauri/target/${{ matrix.platform.rustTarget }}/release/bundle/deb/*.deb
            maxian-desktop/src-tauri/target/${{ matrix.platform.rustTarget }}/release/bundle/rpm/*.rpm
            maxian-desktop/src-tauri/target/${{ matrix.platform.rustTarget }}/release/bundle/appimage/*.AppImage
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
